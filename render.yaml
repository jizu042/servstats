# Required secrets on Render (Dashboard): SESSION_SECRET, ISMCSERVER_TOKEN, ELY_OAUTH_CLIENT_ID, ELY_OAUTH_CLIENT_SECRET.
# CORS_ORIGIN and APP_BASE_URL must match your static site URL (e.g. https://mc-monitor-web.onrender.com).
services:
  - type: web
    name: mc-monitor-api
    runtime: node
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: npm run migrate && npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: API_SOURCE_PREFERENCE
        value: auto
      - key: POLL_TIMEOUT_MS
        value: 8000
      - key: CORS_ORIGIN
        value: https://mc-monitor-web.onrender.com
      - key: APP_BASE_URL
        value: https://mc-monitor-web.onrender.com
      - key: SESSION_SECRET
        sync: false
      - key: ISMCSERVER_TOKEN
        sync: false
      - key: ELY_OAUTH_CLIENT_ID
        sync: false
      - key: ELY_OAUTH_CLIENT_SECRET
        sync: false
      - key: ELY_OAUTH_REDIRECT_URI
        value: https://mc-monitor-api.onrender.com/api/auth/ely/callback
      - key: DATABASE_URL
        fromDatabase:
          name: mc-monitor-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mc-monitor-redis
          property: connectionString

  - type: web
    name: mc-monitor-web
    runtime: static
    rootDir: web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mc-monitor-api.onrender.com
      - key: VITE_DEFAULT_POLL_INTERVAL_SEC
        value: 10
      - key: VITE_DEFAULT_LANG
        value: ru
      - key: VITE_DEFAULT_THEME
        value: dark

  - type: worker
    name: mc-monitor-collector
    runtime: node
    rootDir: worker
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mc-monitor-postgres
          property: connectionString
      - key: API_SOURCE_PREFERENCE
        value: auto
      - key: POLL_TIMEOUT_MS
        value: 8000
      - key: POLL_INTERVAL_MS
        value: 10000
      - key: STATS_RAW_RETENTION_DAYS
        value: 30
      - key: MONITOR_SERVERS
        value: play.hypixel.net:25565
      - key: ISMCSERVER_TOKEN
        sync: false

  - type: redis
    name: mc-monitor-redis
    ipAllowList: []

databases:
  - name: mc-monitor-postgres
    plan: free

